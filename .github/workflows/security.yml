name: Security

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundler_audit:
    name: bundler-audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.3'
          bundler-cache: true
          working-directory: backend

      - name: Audit dependencies for known CVEs
        run: bundle exec bundler-audit check --update

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Gitleaks scans git history — a shallow clone misses commits.
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Scan for secrets
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            LOG_OPTS="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            LOG_OPTS="HEAD~1..HEAD"
          fi
          gitleaks detect --source=. --config=.gitleaks.toml --redact --log-opts="$LOG_OPTS"
