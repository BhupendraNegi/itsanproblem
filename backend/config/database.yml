# Env-driven database config.
#
#   • Local (non-Docker) development & test  → SQLite (no DATABASE_URL set).
#   • Docker dev stack & production           → PostgreSQL (DATABASE_URL set,
#                                               e.g. postgres://user:pw@db:5432/itsanproblem_development).
#
# Rails reads ENV["DATABASE_URL"] at boot; we branch the adapter on its
# presence so a laptop keeps using SQLite while the container uses Postgres
# with zero per-developer config.
<%
  pg_url = ENV["DATABASE_URL"]
%>
default: &default
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

sqlite: &sqlite
  <<: *default
  adapter: sqlite3
  timeout: 5000

postgres: &postgres
  <<: *default
  adapter: postgresql
  encoding: unicode
  url: <%= pg_url %>

development:
  <<: *<%= pg_url ? "postgres" : "sqlite" %>
  <% unless pg_url %>database: storage/development.sqlite3<% end %>

# Warning: The database defined as "test" will be erased and re-generated
# from your development database when you run "rake". Tests always run on
# SQLite locally for speed; CI can override with DATABASE_URL if desired.
test:
  <<: *sqlite
  database: storage/test.sqlite3

# Production runs on PostgreSQL. The solid_cache / solid_queue / solid_cable
# adapters live in the SAME Postgres database as the primary (separate
# connections, distinct migration paths) — see config/cable.yml & cache.yml.
production:
  primary:
    <<: *postgres
  cache:
    <<: *postgres
    migrations_paths: db/cache_migrate
  queue:
    <<: *postgres
    migrations_paths: db/queue_migrate
  cable:
    <<: *postgres
    migrations_paths: db/cable_migrate
