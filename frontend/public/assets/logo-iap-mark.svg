<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <title>it's an problem</title>
  <defs>
    <linearGradient id="brand" gradientUnits="userSpaceOnUse" x1="4" y1="46" x2="44" y2="4">
      <stop offset="0" stop-color="#feda75"/>
      <stop offset="0.25" stop-color="#fa7e1e"/>
      <stop offset="0.5" stop-color="#d62976"/>
      <stop offset="0.75" stop-color="#962fbf"/>
      <stop offset="1" stop-color="#4f5bd5"/>
    </linearGradient>
    <!-- speech bubble with a soft tail, one silhouette -->
    <path id="bubble" d="M16 4 H32 C38.6274 4 44 9.3726 44 16 V24 C44 30.6274 38.6274 36 32 36 H29.5 L19.4 45.7 C18.1 46.9 16 46 16 44.2 V36 C9.3726 36 4 30.6274 4 24 V16 C4 9.3726 9.3726 4 16 4 Z"/>
  </defs>
  <style>
    .edge { stroke: rgba(0, 0, 0, 0.08); }
    @media (prefers-color-scheme: dark) {
      .edge { stroke: rgba(255, 255, 255, 0.28); }
    }
  </style>
  <use href="#bubble" fill="url(#brand)"/>
  <!-- theme-aware hairline so the mark keeps definition on any chrome -->
  <use href="#bubble" class="edge" fill="none" stroke-width="1" vector-effect="non-scaling-stroke"/>
  <!-- the problem: a friendly exclamation -->
  <rect x="21.7" y="10.5" width="4.6" height="13" rx="2.3" fill="#fff"/>
  <circle cx="24" cy="28.6" r="2.6" fill="#fff"/>
</svg>
